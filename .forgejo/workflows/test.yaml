name: Test
on:
    push:
        branches: [master]
    pull_request:
jobs:
    test:
        runs-on: codeberg-medium
        env:
            CARGO_TERM_COLOR: always
            RUSTFLAGS: -D warnings
        steps:
            - uses: https://code.forgejo.org/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Install Rust 1.95
              run: |
                curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- \
                  -y \
                  --default-toolchain 1.95.0 \
                  --profile minimal \
                  --component rustfmt \
                  --component clippy
                echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

            - name: Cache cargo
              uses: https://code.forgejo.org/actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
              with:
                path: |
                    ~/.cargo/registry/index
                    ~/.cargo/registry/cache
                    ~/.cargo/git/db
                    target
                key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                restore-keys: ${{ runner.os }}-cargo-

            - run: cargo fmt --all -- --check
            - run: cargo clippy --all-targets --all-features -- -D warnings
            - run: cargo test --no-fail-fast --features skip-link-followers
